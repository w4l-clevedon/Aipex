name: Deploy via SSH Git Pull

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit to deploy'
        required: false
        default: 'main'
  push:
    branches:
      - main
    paths:
      - 'aipex-podcast-system-v2/**'
      - '.github/workflows/deploy-via-ssh.yml'

permissions:
  contents: read

concurrency:
  group: deploy-aipex-ssh
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull latest code on WordPress server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WP_SSH_HOST }}
          username: ${{ secrets.WP_SSH_USERNAME }}
          key: ${{ secrets.WP_SSH_PRIVATE_KEY }}
          port: ${{ secrets.WP_SSH_PORT }}
          script: |
            set -e

            REPO_DIR="/var/www/vhosts/womensradiostation.com/httpdocs/wp-content/plugins/Aipex"
            PLUGIN_DIR="$REPO_DIR/aipex-podcast-system-v2"
            DEPLOY_REF="${{ github.event.inputs.ref || 'main' }}"

            echo "Starting Aipex file deployment"
            echo "Repository: $REPO_DIR"
            echo "Deploy ref: $DEPLOY_REF"

            cd "$REPO_DIR"
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREVIOUS_COMMIT"

            git fetch origin main --tags

            if [ "$DEPLOY_REF" = "main" ]; then
              git reset --hard origin/main
            else
              git reset --hard "$DEPLOY_REF"
            fi

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: $NEW_COMMIT"

            echo "Validating plugin files"
            test -f "$PLUGIN_DIR/aipex-podcast-system.php"
            test -d "$PLUGIN_DIR/includes"

            echo "Deployment complete: $NEW_COMMIT"
            echo "WP-CLI intentionally skipped to avoid unrelated plugin memory failures. Flush permalinks manually in WordPress when rewrite rules change."
